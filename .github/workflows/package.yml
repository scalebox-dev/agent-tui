name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  npm-package:
    name: Build npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Pack
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-tui-npm-package
          path: artifacts/*.tgz
          if-no-files-found: error

