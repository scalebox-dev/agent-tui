name: Package and Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and verify without publishing to npm"
        required: false
        type: boolean
        default: true
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Verify npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Pack
        run: |
          mkdir -p artifacts
          npm pack --pack-destination artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-tui-npm-package
          path: artifacts/*.tgz
          if-no-files-found: error

  publish:
    name: Publish npm packages
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.dry_run != true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Publish release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run release:local
